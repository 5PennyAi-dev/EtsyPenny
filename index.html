        <h2>How PennySEO Works</h2>
        <ol>
          <li><strong>Upload Your Product Photo</strong> — Our AI reads your product's style, colors, typography, and target audience in seconds. No forms to fill — just drop your image.</li>
          <li><strong>Get Scored Keywords &amp; a Ready-Made Listing</strong> — Receive AI-generated titles, tags, and descriptions. Every keyword scored by real Google search volume, buyer intent, product fit, and competition.</li>
          <li><strong>Copy to Etsy &amp; Rank Higher</strong> — Export your optimized tags and listing. Paste them into your Etsy shop and watch your visibility grow.</li>
        </ol>

        <h2>Features</h2>
        <ul>
          <li><strong>Your Photo Is the Brief</strong> — You don't type keywords. You upload a photo. Our AI reads aesthetic, typography, color palette, and target audience — then builds your entire keyword strategy from what it sees.</li>
          <li><strong>Real Search Data, Not Estimates</strong> — Every keyword is backed by live Google search volume, CPC, and competition data. You see actual buyer demand — not scraped approximations from marketplace pages.</li>
          <li><strong>Keywords Scored, Not Just Listed</strong> — Each keyword gets a composite score across four axes: search volume, buyer intent, relevance to your product, and competition level. Pick the winners, skip the noise.</li>
        </ul>
